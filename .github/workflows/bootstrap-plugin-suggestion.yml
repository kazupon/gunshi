name: Bootstrap plugin-suggestion npm publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish from, for example v0.35.2
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish @gunshi/plugin-suggestion to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish @gunshi/plugin-suggestion to npm
        working-directory: packages/plugin-suggestion
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_BOOTSTRAP }}
        run: |
          test -n "$NODE_AUTH_TOKEN"
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if pnpm view "$name@$version" version > /dev/null 2>&1; then
            echo "↺ $name@$version already published, skipping"
          else
            echo "⚡ Publishing $name@$version to npm"
            pnpm publish --access public --no-git-checks --tag latest
          fi
          npm access public "$name"
          npm view "$name@$version" version --registry=https://registry.npmjs.org/
