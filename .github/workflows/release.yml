name: Release

# Triggered automatically by tag push (created via `pnpm release` → bumpp).
# Can also be re-run manually via `workflow_dispatch` for partial recovery
# (e.g. retry only npm-publish after a transient failure).
on:
  push:
    branches-ignore: ['**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - jsr-publish
          - release-notes
      tag:
        description: Existing tag to release (e.g. v0.30.9). Required for workflow_dispatch.
        type: string
        required: true

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions: {}

jobs:
  npm-publish:
    name: Publish to npm
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publisher + provenance
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node.js
        # zizmor: ignore[cache-poisoning] cache key is the pnpm-lock.yaml hash
        # and `pnpm install --frozen-lockfile` re-verifies integrity, so a
        # poisoned cache cannot influence what gets published to npm.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish each package to npm
        # OIDC trusted publisher — secret は不要、provenance も自動付与。
        # 既 publish 済 version は冪等に skip (workflow_dispatch リトライ用)。
        run: |
          for PKG in packages/*/; do
            if [[ "$PKG" == "packages/docs/" ]]; then
              pnpm run build:docs
            fi
            if [[ "$PKG" == "packages/gunshi/" ]]; then
              cp -r assets "$PKG"assets
              cp README.md CHANGELOG.md LICENSE "$PKG"
            fi
            pushd "$PKG" > /dev/null
            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")
            if pnpm view "$name@$version" version > /dev/null 2>&1; then
              echo "↺ $name@$version already published, skipping"
            else
              echo "⚡ Publishing $name@$version to npm"
              pnpm publish --access public --no-git-checks --tag latest
            fi
            popd > /dev/null
          done

  jsr-publish:
    name: Publish to JSR
    # JSR cannot resolve `workspace:*` directly, so `scripts/jsr.ts` rewrites
    # each package.json to pin internal deps to the release version. The
    # subsequent `pnpm install` then has to fetch (for example) `gunshi@0.32.0`
    # from npm — which only exists once `npm-publish` has finished. Make this
    # job depend on `npm-publish` and only run after it succeeds (or, for
    # workflow_dispatch retry, skip the `needs` check via `always()`).
    needs: [npm-publish]
    if: >-
      always() && (
        (github.event_name == 'push' && needs.npm-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.job == 'all' || inputs.job == 'jsr-publish'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR OIDC
    steps:
      - name: Checkout codes
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node.js
        # zizmor: ignore[cache-poisoning] cache key is the pnpm-lock.yaml hash
        # and `pnpm install --frozen-lockfile` re-verifies integrity, so a
        # poisoned cache cannot influence what gets published to JSR.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Rewrite workspace:* to pinned versions for JSR
        # JSR は workspace:* を解決しないため、各 package の package.json で
        # 依存を実 version に書き換える (scripts/jsr.ts が担当)。
        run: |
          for PKG in packages/*/; do
            [[ "$PKG" == "packages/docs/" ]] && continue
            pnpm exec tsx ./scripts/jsr.ts --package "${PKG%/}" --tag latest
          done

      - name: Re-install with rewritten package.json
        # `--ignore-scripts` で esbuild 等の build script を skip
        # (workspace の onlyBuiltDependencies は dlx context で読まれないため)。
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Publish each package to JSR
        # 既 publish 済 version は冪等に skip (workflow_dispatch リトライ用)。
        run: |
          for PKG in packages/*/; do
            [[ "$PKG" == "packages/docs/" ]] && continue
            pushd "$PKG" > /dev/null
            scope=$(node -p "require('./jsr.json').name")
            version=$(node -p "require('./jsr.json').version")
            if pnpm exec jsr show "$scope@$version" > /dev/null 2>&1; then
              echo "↺ $scope@$version already published, skipping"
            else
              echo "⚡ Publishing $scope@$version to JSR"
              pnpm exec jsr publish -c jsr.json --allow-dirty
            fi
            popd > /dev/null
          done

  release-notes:
    name: Create GitHub Release and sync changelog
    needs: [npm-publish, jsr-publish]
    # Runs when:
    # - tag push and both publish jobs succeeded, OR
    # - workflow_dispatch with job=release-notes (publish jobs are skipped), OR
    # - workflow_dispatch with job=all and both publish jobs succeeded
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success' &&
          needs.jsr-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'release-notes') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'all' &&
          needs.npm-publish.result == 'success' &&
          needs.jsr-publish.result == 'success')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release 作成 + main への CHANGELOG push
    steps:
      - name: Checkout main
        # zizmor: ignore[artipacked] needs persisted credentials so that
        # stefanzweifel/git-auto-commit-action can push the changelog commit.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        # 既存 Release があれば skip (workflow_dispatch リトライ時の冪等性)。
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog from GitHub Releases
        run: npx gh-changelogen --repo=kazupon/gunshi --tag="$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
