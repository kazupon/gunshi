packages:
  - packages/*
  - playground/**
  - "!playground/bun"
catalog:
  typescript: ^5.9.3
  zod: ^4.3.6
  deno: ^2.7.4
  jsr: ^0.13.5
  jsr-exports-lint: ^0.4.2
  publint: ^0.3.18
  tsdown: 0.21.0
  "@types/node": ^25.4.0
  typedoc: ^0.28.17
  tsx: ^4.21.0
  typedoc-plugin-markdown: ^4.10.0
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - deno
  - zod
  - knip
  - publint
  - tsx
  - args-tokens
  - "@bomb.sh/tab"
  - eslint-plugin-jsdoc
  - "@typescript/native-preview"
  - lint-staged
  - tsdown
  - rolldown
  - "@rolldown/pluginutils"
  - "@kazupon/eslint-config"
  - gunshi
  - "@gunshi/bone"
  - "@gunshi/combinators"
  - "@gunshi/docs"
  - "@gunshi/definition"
  - "@gunshi/plugin"
  - "@gunshi/plugin-completion"
  - "@gunshi/plugin-dryrun"
  - "@gunshi/plugin-global"
  - "@gunshi/plugin-i18n"
  - "@gunshi/plugin-renderer"
  - "@gunshi/resources"
  - "@gunshi/shared"
