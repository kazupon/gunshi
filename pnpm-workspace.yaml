packages:
  - packages/*
  - playground/**
  - "!playground/bun"
catalog:
  typescript: ^6.0.2
  zod: ^4.3.6
  deno: ^2.7.11
  jsr: ^0.14.3
  jsr-exports-lint: ^0.4.2
  publint: ^0.3.18
  tsdown: 0.21.9
  "@types/node": ^25.5.2
  typedoc: ^0.28.18
  tsx: ^4.21.0
  typedoc-plugin-markdown: ^4.11.0
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - deno
  - zod
  - knip
  - publint
  - tsx
  - args-tokens
  - "@bomb.sh/tab"
  - eslint-plugin-jsdoc
  - "@typescript/native-preview"
  - lint-staged
  - tsdown
  - rolldown
  - "@rolldown/pluginutils"
  - "@kazupon/eslint-config"
  - gunshi
  - "@gunshi/bone"
  - "@gunshi/combinators"
  - "@gunshi/docs"
  - "@gunshi/definition"
  - "@gunshi/plugin"
  - "@gunshi/plugin-completion"
  - "@gunshi/plugin-dryrun"
  - "@gunshi/plugin-global"
  - "@gunshi/plugin-i18n"
  - "@gunshi/plugin-renderer"
  - "@gunshi/resources"
  - "@gunshi/shared"
